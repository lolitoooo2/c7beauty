# Exemple de vhost Nginx sur le serveur (hors Docker).
# Le frontend Docker proxy déjà /api vers le backend — un seul upstream suffit.
#
#   sudo ln -s /chemin/vers/c7beauty/deploy/nginx-vhost.example.conf /etc/nginx/sites-enabled/c7beauty
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name c7beauty.example.com;

    # Certbot : sudo certbot --nginx -d c7beauty.example.com

    location / {
        proxy_pass         http://127.0.0.1:8092;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 10m;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }
}
