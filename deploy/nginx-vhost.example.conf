# Nginx hôte — production c7beauty.fr
# Remplace l'ancienne config statique (/var/www/c7beauty).
# Le conteneur frontend (127.0.0.1:8092) sert le SPA et proxy /api → backend.
#
#   sudo cp deploy/nginx-vhost.example.conf /etc/nginx/sites-available/c7beauty
#   sudo ln -sf /etc/nginx/sites-available/c7beauty /etc/nginx/sites-enabled/c7beauty
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    server_name c7beauty.fr www.c7beauty.fr;

    ssl_certificate     /etc/letsencrypt/live/c7beauty.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/c7beauty.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirection www → sans www (optionnel, ajuster si besoin)
    if ($host = www.c7beauty.fr) {
        return 301 https://c7beauty.fr$request_uri;
    }

    location / {
        proxy_pass         http://127.0.0.1:8092;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Uploads KYC / photos (multer 5 Mo, marge Nginx)
        client_max_body_size 10m;
        proxy_request_buffering off;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }
}

server {
    listen 80;
    server_name c7beauty.fr www.c7beauty.fr;

    if ($host = www.c7beauty.fr) {
        return 301 https://$host$request_uri;
    }

    if ($host = c7beauty.fr) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
